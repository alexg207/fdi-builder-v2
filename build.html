<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How we built Lantern's sales intelligence dashboard · Primary FDI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Newsreader:opsz,wght@6..72,500;6..72,600;6..72,700&display=swap" rel="stylesheet">
<style>
:root{
  --amber:hsl(36 92% 50%); --amber-light:hsl(40 96% 62%); --amber-dark:hsl(34 90% 42%); --amber-deep:hsl(30 80% 30%);
  --amber-tint:hsl(36 92% 50% / .12);
  --bg:hsl(28 14% 7%); --bg-2:hsl(26 16% 9%); --surface:hsl(30 13% 11%); --surface-2:hsl(30 12% 14%);
  --border:hsl(34 18% 20%); --border-soft:hsl(34 14% 17%);
  --text:hsl(40 30% 96%); --text-mid:hsl(38 16% 78%); --text-muted:hsl(36 12% 62%); --text-faint:hsl(34 10% 48%);
  --q-high:hsl(150 58% 52%); --q-high-d:hsl(150 46% 40%);
  --q-med:hsl(38 95% 56%);  --q-med-d:hsl(34 90% 44%);
  --q-low:hsl(30 42% 52%);  --q-low-d:hsl(30 34% 42%);
  --font-sans:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif;
  --font-display:'Newsreader',Georgia,'Times New Roman',serif;
  --font-mono:'JetBrains Mono',ui-monospace,'SF Mono',Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow:hidden;}
a{color:inherit;text-decoration:none;}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}

.glow-field{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.glow-field::before{content:"";position:absolute;top:-24%;left:50%;width:1200px;height:1200px;transform:translateX(-50%);
  background:radial-gradient(circle at center,hsl(36 92% 50% / .16) 0%,hsl(34 90% 42% / .07) 32%,transparent 62%);filter:blur(10px);animation:breathe 7s ease-in-out infinite;}
.glow-field::after{content:"";position:absolute;bottom:-30%;left:-12%;width:800px;height:800px;background:radial-gradient(circle at center,hsl(30 80% 30% / .14) 0%,transparent 64%);}
@keyframes breathe{0%,100%{opacity:.8;}50%{opacity:1;}}
.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.5;background-image:radial-gradient(hsl(40 30% 96% / .022) 1px,transparent 1px);background-size:3px 3px;}

.topbar{position:fixed;top:0;left:0;right:0;z-index:6;display:flex;align-items:center;justify-content:space-between;height:60px;padding:0 34px;background:linear-gradient(180deg,var(--bg) 55%,transparent);}
.brand{display:flex;align-items:center;gap:11px;}
.logo-mark{width:26px;height:26px;background:var(--text);display:flex;align-items:center;justify-content:center;border-radius:4px;flex-shrink:0;}
.logo-mark svg{width:17px;height:17px;stroke:var(--amber);stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.brand .nm{font-size:14px;font-weight:600;letter-spacing:-.01em;}
.brand .x{color:var(--amber);font-weight:500;margin:0 5px;}
.brand .pv{color:var(--text-mid);font-weight:500;}
.skip{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:500;color:var(--text-faint);border:1px solid var(--border-soft);border-radius:8px;padding:7px 13px;transition:color 150ms,border-color 150ms;}
.skip:hover{color:var(--text-mid);border-color:var(--border);}
.skip svg{width:13px;height:13px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round;}

/* stage — column flex + margin:auto so content centers when it fits AND stays fully scrollable when tall */
.stage{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;overflow-y:auto;padding:76px 34px 128px;}
.stage-inner{width:100%;max-width:1080px;margin:auto 0;position:relative;}
.act{opacity:0;}
.act.enter{animation:fadeUp .6s cubic-bezier(.16,.84,.44,1) forwards;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.act-eyebrow{display:flex;align-items:center;gap:10px;justify-content:center;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);font-weight:600;margin-bottom:15px;}
.act-eyebrow .step-n{font-family:var(--font-mono);color:var(--text-faint);}
.act-eyebrow .bar{width:22px;height:1px;background:hsl(36 92% 50% / .5);}
.act-title{font-family:var(--font-display);font-size:33px;font-weight:600;letter-spacing:-.02em;line-height:1.16;text-align:center;max-width:840px;margin:0 auto 11px;}
.act-title .accent{color:var(--amber-light);}
.act-narr{font-size:15px;line-height:1.55;color:var(--text-muted);text-align:center;max-width:660px;margin:0 auto 32px;}

.chip .tick,.qual-item .tick,.ev-col .st{color:var(--q-high);}
.pop{opacity:0;transform:translateY(10px) scale(.98);}
.pop.on{animation:pop .5s cubic-bezier(.16,.84,.44,1) forwards;}
@keyframes pop{to{opacity:1;transform:none;}}
.col-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);margin-bottom:14px;font-weight:600;}

/* act 1 ICP */
.icp-grid{display:grid;grid-template-columns:1fr 44px 1.15fr;gap:26px;align-items:center;max-width:900px;margin:0 auto;}
.read-list,.qual-list{display:flex;flex-direction:column;gap:10px;}
.read-item{background:var(--surface);border:1px solid var(--border-soft);border-radius:11px;padding:13px 15px;}
.read-item .t{font-size:14px;font-weight:600;color:var(--text);}
.read-item .m{font-size:12px;color:var(--text-faint);margin-top:3px;}
.icp-arrow{display:flex;align-items:center;justify-content:center;color:var(--amber);}
.icp-arrow svg{width:30px;height:30px;stroke:currentColor;stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.qual-item{display:flex;align-items:center;gap:11px;background:linear-gradient(165deg,var(--surface-2),var(--surface));border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;color:var(--text-mid);}
.qual-item .tick,.chip .tick{width:17px;height:17px;flex-shrink:0;}
.qual-item .tick svg,.chip .tick svg,.ev-col .st svg{stroke:currentColor;stroke-width:2.6;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.qual-item .tick svg{width:17px;height:17px;}
.icp-foot{display:flex;gap:12px;justify-content:center;margin-top:28px;flex-wrap:wrap;}
.icp-foot .pill{font-size:12.5px;color:var(--text-mid);background:var(--amber-tint);border:1px solid hsl(36 92% 50% / .3);border-radius:999px;padding:7px 15px;}
.icp-foot .pill b{color:var(--amber-light);font-weight:600;}

/* act 2 signals */
.axes-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;max-width:960px;margin:0 auto;}
.axis-card{position:relative;background:linear-gradient(165deg,var(--surface-2),var(--surface));border:1px solid var(--border);border-radius:14px;padding:20px 18px;overflow:hidden;}
.axis-card.wow{border-color:hsl(36 92% 50% / .5);box-shadow:0 0 0 1px hsl(36 92% 50% / .25),0 0 34px hsl(36 92% 50% / .14);}
.axis-card .kind{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);font-weight:600;margin-bottom:10px;}
.axis-card.wow .kind{color:var(--amber);}
.axis-card .nm{font-size:16px;font-weight:600;letter-spacing:-.01em;margin-bottom:4px;}
.axis-card .wt{font-family:var(--font-mono);font-size:30px;font-weight:600;color:var(--amber-light);letter-spacing:-.02em;line-height:1;margin:12px 0 4px;}
.axis-card .wt span{font-size:14px;color:var(--text-faint);}
.axis-card .ms{font-size:12.5px;line-height:1.5;color:var(--text-muted);margin-top:8px;min-height:54px;}
.wt-track{height:4px;border-radius:3px;background:var(--border-soft);overflow:hidden;margin-top:6px;}
.wt-fill{height:100%;width:0;border-radius:3px;background:linear-gradient(90deg,var(--amber-dark),var(--amber-light));transition:width 1.1s cubic-bezier(.16,.84,.44,1);}
.axes-note{text-align:center;font-size:13px;color:var(--text-muted);margin-top:24px;max-width:640px;margin-left:auto;margin-right:auto;}
.axes-note code{font-family:var(--font-mono);font-size:11.5px;color:var(--amber-light);background:var(--amber-tint);padding:2px 7px;border-radius:5px;}

/* act 1 process / pipeline */
.pipe{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;max-width:1000px;margin:0 auto;position:relative;}
.pipe::before{content:"";position:absolute;top:32px;left:9%;right:9%;height:1px;background:linear-gradient(90deg,transparent,hsl(36 92% 50% / .42),transparent);}
.pstage{position:relative;display:flex;flex-direction:column;background:linear-gradient(165deg,var(--surface-2),var(--surface));border:1px solid var(--border);border-radius:13px;padding:16px 14px;text-align:center;}
.ps-n{width:30px;height:30px;margin:0 auto 12px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--amber);box-shadow:0 0 0 4px var(--bg),0 0 18px hsl(36 92% 50% / .18);}
.ps-name{font-size:14.5px;font-weight:600;letter-spacing:-.01em;margin-bottom:9px;}
.ps-desc{flex:1;font-size:12.5px;line-height:1.5;color:var(--text-mid);margin-bottom:13px;}
.ps-tools{border-top:1px solid var(--border-soft);padding-top:10px;display:flex;flex-wrap:wrap;gap:5px;justify-content:center;}
.ps-tools .ptl{width:100%;font-size:8.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--text-faint);font-weight:600;margin-bottom:6px;}
.ptool{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-sans);font-size:12px;font-weight:500;color:var(--text);background:var(--bg-2);border:1px solid var(--border-soft);border-radius:7px;padding:4px 9px;letter-spacing:0;}
.ptool img{width:14px;height:14px;border-radius:3px;background:#fff;padding:1px;object-fit:contain;flex-shrink:0;}
.pipe-foot{text-align:center;font-size:12.5px;color:var(--text-faint);margin-top:24px;letter-spacing:.02em;}

/* act 3 scan */
.scan-wrap{max-width:900px;margin:0 auto;}
.scan-counter{text-align:center;margin-bottom:20px;}
.scan-counter .n{font-family:var(--font-mono);font-size:52px;font-weight:600;color:var(--text);letter-spacing:-.03em;line-height:1;}
.scan-counter .l{font-size:13px;color:var(--text-muted);margin-top:8px;letter-spacing:.02em;}
.dot-grid{display:grid;grid-template-columns:repeat(28,1fr);gap:6px;max-width:720px;margin:0 auto 22px;}
.dot{width:100%;aspect-ratio:1;border-radius:50%;background:var(--border-soft);opacity:.4;transition:opacity .3s,background .3s,box-shadow .3s;}
.dot.lit{opacity:1;background:hsl(36 60% 40%);}
.dot.match{opacity:1;background:var(--amber);box-shadow:0 0 8px hsl(36 92% 50% / .8);}
.dot.dim{opacity:.16;background:var(--border-soft);box-shadow:none;}
.funnel{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:12px;}
.fstat{text-align:center;background:var(--surface);border:1px solid var(--border-soft);border-radius:11px;padding:12px 18px;min-width:120px;}
.fstat .n{font-family:var(--font-mono);font-size:24px;font-weight:600;color:var(--amber-light);line-height:1;}
.fstat.match .n{color:var(--q-high);}
.fstat .l{font-size:11px;color:var(--text-muted);margin-top:6px;}
.funnel .fa{color:var(--text-faint);}
.funnel .fa svg,.score-arrow svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.scan-note{text-align:center;font-size:12.5px;color:var(--text-faint);max-width:620px;margin:0 auto 20px;line-height:1.5;}
.excludes{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:760px;margin:0 auto;}
.ex-lead{width:100%;text-align:center;font-size:12px;color:var(--text-faint);margin-bottom:4px;letter-spacing:.02em;}
.ex{font-size:12px;color:var(--text-muted);border:1px solid var(--border-soft);border-radius:7px;padding:5px 10px;position:relative;transition:color .3s,opacity .3s;}
.ex.struck{color:var(--text-faint);opacity:.55;}
.ex.struck::after{content:"";position:absolute;left:8px;right:8px;top:50%;height:1px;background:var(--amber-dark);transform:scaleX(0);transform-origin:left;animation:strike .35s forwards;}
@keyframes strike{to{transform:scaleX(1);}}

/* act 4 evidence */
.ev-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:24px;max-width:940px;margin:0 auto;align-items:start;}
.ev-cols{display:flex;flex-direction:column;gap:9px;}
.ev-col{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border-soft);border-radius:10px;padding:11px 14px;}
.ev-col .st{width:15px;height:15px;flex-shrink:0;}
.ev-col .st svg{width:15px;height:15px;}
.ev-col .f{font-size:13.5px;font-weight:600;color:var(--text);flex:1;}
.ev-col .s{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);}
.ev-feed{background:hsl(28 16% 6%);border:1px solid var(--border-soft);border-radius:13px;padding:15px 16px 6px;height:352px;overflow:hidden;position:relative;}
.ev-feed .fh{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.ev-feed .fh .dotpulse{width:7px;height:7px;border-radius:50%;background:var(--q-high);box-shadow:0 0 8px var(--q-high);animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.feed-line{display:flex;align-items:baseline;gap:9px;font-size:12px;line-height:1.4;padding:6px 0;border-bottom:1px solid var(--border-soft);opacity:0;transform:translateY(6px);}
.feed-line.on{animation:pop .4s forwards;}
.feed-line .tt{font-family:var(--font-mono);font-size:9.5px;font-weight:600;padding:2px 6px;border-radius:4px;flex-shrink:0;letter-spacing:.03em;}
.feed-line .t1{background:hsl(150 40% 30% / .3);color:var(--q-high);}
.feed-line .t2{background:var(--amber-tint);color:var(--amber-light);}
.feed-line .tx{color:var(--text-mid);}

/* act 5 score */
.score-wrap{max-width:900px;margin:0 auto;}
.formula{text-align:center;font-family:var(--font-mono);font-size:14px;color:var(--text-mid);margin-bottom:26px;letter-spacing:.01em;}
.formula b{color:var(--amber-light);font-weight:600;}
.hero-score{display:grid;grid-template-columns:1.3fr 46px .9fr;gap:22px;align-items:center;max-width:820px;margin:0 auto;}
.hero-name{font-size:15px;font-weight:600;margin-bottom:4px;}
.hero-name .seg{font-size:11px;color:var(--text-faint);font-weight:500;margin-left:8px;}
.abars{display:flex;flex-direction:column;gap:9px;margin-top:12px;}
.abar{display:grid;grid-template-columns:96px 1fr 30px;align-items:center;gap:10px;}
.abar .an{font-size:11.5px;color:var(--text-muted);text-align:right;}
.abar .track{height:8px;border-radius:4px;background:var(--border-soft);overflow:hidden;}
.abar .fill{height:100%;width:0;border-radius:4px;background:linear-gradient(90deg,var(--amber-dark),var(--amber-light));transition:width .9s cubic-bezier(.16,.84,.44,1);}
.abar .av{font-family:var(--font-mono);font-size:12px;color:var(--text-mid);text-align:right;}
.score-arrow{display:flex;align-items:center;justify-content:center;color:var(--amber);}
.composite{text-align:center;background:linear-gradient(165deg,var(--surface-2),var(--surface));border:1px solid var(--border);border-radius:16px;padding:22px 18px;}
.composite .big{font-family:var(--font-mono);font-size:56px;font-weight:600;line-height:1;letter-spacing:-.03em;color:var(--q-high);}
.composite .big .u{font-size:20px;color:var(--text-faint);}
.composite .tier{display:inline-block;margin-top:12px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border-radius:7px;background:hsl(150 40% 30% / .25);color:var(--q-high);}
.score-cap{text-align:center;font-size:13px;color:var(--text-muted);margin-top:24px;}

/* act 6 ranked list */
.ranked{max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:6px;}
.row{display:grid;grid-template-columns:22px 1fr 150px 52px;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border-soft);border-radius:10px;padding:9px 14px;opacity:0;transform:translateX(-8px);}
.row.on{animation:rowin .5s cubic-bezier(.16,.84,.44,1) forwards;}
@keyframes rowin{to{opacity:1;transform:none;}}
.row .rk{font-family:var(--font-mono);font-size:12px;color:var(--text-faint);text-align:center;}
.row .nm{font-size:13.5px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.row .nm .sg{font-size:10.5px;color:var(--text-faint);font-weight:500;margin-left:7px;}
.row .track{height:7px;border-radius:4px;background:var(--border-soft);overflow:hidden;}
.row .fill{height:100%;width:0;border-radius:4px;transition:width .8s cubic-bezier(.16,.84,.44,1);}
.q-high .fill{background:linear-gradient(90deg,var(--q-high-d),var(--q-high));} .q-high .sc{color:var(--q-high);}
.q-med .fill{background:linear-gradient(90deg,var(--q-med-d),var(--q-med));} .q-med .sc{color:var(--q-med);}
.q-low .fill{background:linear-gradient(90deg,var(--q-low-d),var(--q-low));} .q-low .sc{color:var(--q-low);}
.row .sc{font-family:var(--font-mono);font-size:15px;font-weight:600;text-align:right;}
.partners{max-width:720px;margin:16px auto 0;}
.partners .ph{text-align:center;font-size:12px;color:var(--text-faint);letter-spacing:.04em;margin-bottom:10px;}
.prow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.pcard{background:linear-gradient(165deg,var(--surface-2),var(--surface));border:1px solid hsl(36 92% 50% / .3);border-radius:11px;padding:11px 15px;min-width:180px;opacity:0;}
.pcard.on{animation:pop .5s forwards;}
.pcard .pn{font-size:13.5px;font-weight:600;}
.pcard .ps{font-size:11px;color:var(--amber-light);margin-top:3px;}
.pcard .pnote{font-size:11px;color:var(--text-faint);margin-top:5px;line-height:1.4;}

/* act 7 network map */
.net-wrap{position:relative;max-width:1000px;margin:0 auto;}
.net-svg{width:100%;height:min(56vh,470px);display:block;cursor:grab;touch-action:none;background:radial-gradient(circle at 50% 46%,hsl(30 20% 12% / .5),transparent 60%);border:1px solid var(--border-soft);border-radius:16px;}
.net-svg.grabbing{cursor:grabbing;}
.net-svg text{user-select:none;}
.net-legend{position:absolute;left:14px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:5px;font-size:11px;color:var(--text-muted);background:hsl(28 16% 6% / .74);border:1px solid var(--border-soft);border-radius:9px;padding:9px 12px;}
.net-legend .lg{display:flex;align-items:center;gap:7px;}
.net-legend .lgh{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint);font-weight:600;margin-bottom:1px;}
.net-legend .sw{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.net-legend .ring{width:12px;height:12px;border-radius:50%;border:1.6px solid var(--amber-light);flex-shrink:0;}
.net-hint{position:absolute;right:14px;top:12px;font-size:11px;color:var(--text-faint);letter-spacing:.02em;background:hsl(28 16% 6% / .74);border:1px solid var(--border-soft);border-radius:9px;padding:7px 11px;}
.net-note{text-align:center;font-size:11.5px;color:var(--text-faint);margin-top:12px;}
.net-tip{position:fixed;z-index:20;pointer-events:none;opacity:0;transition:opacity .12s;max-width:270px;
  background:hsl(28 16% 6% / .97);border:1px solid var(--border);border-radius:10px;padding:10px 13px;box-shadow:0 12px 34px hsl(28 40% 3% / .6);}
.net-tip.on{opacity:1;}
.net-tip .tn{font-size:13.5px;font-weight:600;color:var(--text);}
.net-tip .tmeta{font-size:11px;color:var(--text-faint);margin-top:2px;}
.net-tip .tby{font-size:12px;color:var(--text-mid);margin-top:7px;padding-top:7px;border-top:1px solid var(--border-soft);}
.net-tip .tby b{color:var(--amber-light);font-weight:600;}
.net-node{cursor:pointer;}

/* cold + reveal */
.cold{text-align:center;}
.cold .mk,.reveal .mk{width:104px;height:104px;margin:0 auto 30px;border-radius:24px;background:linear-gradient(160deg,var(--surface-2),var(--surface));border:1px solid var(--border);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 1px hsl(36 92% 50% / .2),0 0 66px hsl(36 92% 50% / .3);animation:lantern 4.2s ease-in-out infinite;}
.cold .mk svg,.reveal .mk svg{width:64px;height:64px;stroke:var(--amber);stroke-width:1.4;fill:none;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 14px hsl(36 92% 50% / .55));}
@keyframes lantern{0%,100%{box-shadow:0 0 0 1px hsl(36 92% 50% / .18),0 0 52px hsl(36 92% 50% / .2);}50%{box-shadow:0 0 0 1px hsl(36 92% 50% / .3),0 0 92px hsl(36 92% 50% / .36);}}
.cold .eye,.reveal .eye{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);font-weight:600;margin-bottom:18px;}
.cold h1{font-family:var(--font-display);font-size:44px;font-weight:600;letter-spacing:-.02em;line-height:1.12;max-width:760px;margin:0 auto 16px;}
.cold h1 .accent{color:var(--amber-light);}
.cold p{font-size:16px;color:var(--text-muted);max-width:560px;margin:0 auto;line-height:1.55;}

/* bottom dock */
.dock{position:fixed;left:0;right:0;bottom:0;z-index:5;padding:14px 34px 18px;background:linear-gradient(0deg,var(--bg) 55%,transparent);}
.dock-inner{max-width:1080px;margin:0 auto;}
.rail{display:flex;align-items:flex-end;gap:12px;margin-bottom:16px;}
.seg{flex:1;cursor:pointer;}
.seg .lbl{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-faint);margin-bottom:6px;transition:color .2s;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.seg.done .lbl{color:var(--text-mid);} .seg.active .lbl{color:var(--amber);}
.seg .lbl .sn{font-family:var(--font-mono);}
.seg:hover .lbl{color:var(--text-mid);}
.seg .track{height:3px;border-radius:2px;background:var(--border-soft);overflow:hidden;}
.seg .fill{height:100%;width:0;background:linear-gradient(90deg,var(--amber-dark),var(--amber-light));border-radius:2px;transition:width .45s cubic-bezier(.16,.84,.44,1);}
.controls{display:flex;align-items:center;justify-content:center;gap:16px;position:relative;}
.btn-back{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:var(--text-muted);background:none;border:1px solid var(--border-soft);border-radius:9px;padding:11px 16px;cursor:pointer;transition:color .15s,border-color .15s;}
.btn-back:hover{color:var(--text);border-color:var(--border);}
.btn-back[hidden]{display:none;}
.btn-back svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.btn-next{display:inline-flex;align-items:center;gap:10px;font-size:14.5px;font-weight:600;letter-spacing:-.01em;color:hsl(28 40% 8%);
  background:linear-gradient(180deg,var(--amber-light),var(--amber));padding:13px 26px;border-radius:11px;cursor:pointer;border:none;
  box-shadow:0 0 0 1px hsl(36 92% 50% / .45),0 7px 22px hsl(36 92% 50% / .24),inset 0 1px 0 hsl(45 100% 80% / .55);transition:transform .16s,box-shadow .16s;}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 0 0 1px hsl(36 92% 50% / .65),0 16px 40px hsl(36 92% 50% / .4);}
.btn-next svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.3;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.keyhint{position:absolute;right:0;font-size:10.5px;color:var(--text-faint);letter-spacing:.03em;}
.keyhint kbd{font-family:var(--font-mono);background:var(--surface);border:1px solid var(--border-soft);border-radius:4px;padding:1px 5px;font-size:10px;color:var(--text-muted);}

.reveal{position:fixed;inset:0;z-index:8;background:hsl(28 16% 6% / .92);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .6s;}
.reveal.show{opacity:1;pointer-events:auto;}
.reveal .inner{text-align:center;max-width:640px;padding:0 30px;transform:translateY(14px);transition:transform .7s cubic-bezier(.16,.84,.44,1);}
.reveal.show .inner{transform:none;}
.reveal .mk{width:92px;height:92px;}
.reveal h2{font-family:var(--font-display);font-size:37px;font-weight:600;letter-spacing:-.02em;line-height:1.14;margin-bottom:14px;}
.reveal p{font-size:16px;color:var(--text-muted);line-height:1.55;margin-bottom:14px;}
.reveal .axes-mini{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:28px;}
.reveal .axis-mini{font-size:11px;color:var(--text-mid);background:var(--amber-tint);border:1px solid hsl(36 92% 50% / .28);border-radius:6px;padding:5px 11px;}
.reveal .cta-row{display:flex;flex-direction:column;align-items:center;gap:14px;}
.cta{display:inline-flex;align-items:center;gap:11px;padding:14px 28px;border-radius:11px;font-size:15px;font-weight:600;letter-spacing:-.01em;color:hsl(28 40% 8%);
  background:linear-gradient(180deg,var(--amber-light),var(--amber));box-shadow:0 0 0 1px hsl(36 92% 50% / .45),0 8px 26px hsl(36 92% 50% / .28),inset 0 1px 0 hsl(45 100% 80% / .6);transition:transform .16s,box-shadow .16s;}
.cta:hover{transform:translateY(-2px);box-shadow:0 0 0 1px hsl(36 92% 50% / .65),0 16px 44px hsl(36 92% 50% / .42);}
.cta svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.3;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.replay{font-size:13px;color:var(--text-faint);cursor:pointer;background:none;border:none;transition:color .15s;}
.replay:hover{color:var(--text-mid);}

@media (max-width:900px){
  .act-title{font-size:26px;}
  .icp-grid,.hero-score{grid-template-columns:1fr;gap:18px;}
  .icp-arrow,.score-arrow{transform:rotate(90deg);}
  .axes-row{grid-template-columns:repeat(2,1fr);}
  .pipe{grid-template-columns:repeat(2,1fr);} .pipe::before{display:none;}
  .ev-grid{grid-template-columns:1fr;} .ev-feed{height:230px;}
  .dot-grid{grid-template-columns:repeat(20,1fr);}
  .row{grid-template-columns:20px 1fr 44px;} .row .track{display:none;}
  .keyhint{display:none;} .seg .lbl{font-size:0;} .seg .lbl .sn{font-size:10px;}
  .cold h1{font-size:32px;} .reveal h2{font-size:28px;}
  .net-svg{height:52vh;}
}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;}
  .act{opacity:1!important;}
}
</style>
</head>
<body>
<div class="glow-field"></div>
<div class="grain"></div>

<header class="topbar">
  <div class="brand">
    <div class="logo-mark" id="brandMark"></div>
    <span class="nm"><span id="brandName">Lantern</span><span class="x">×</span><span class="pv">Primary</span></span>
  </div>
  <a class="skip" href="./dashboard.html">Skip to dashboard <svg viewBox="0 0 24 24"><polyline points="9,6 15,12 9,18"/></svg></a>
</header>

<div class="stage"><div class="stage-inner" id="stage"></div></div>
<div class="net-tip" id="netTip"></div>

<div class="dock">
  <div class="dock-inner">
    <div class="rail" id="rail"></div>
    <div class="controls">
      <button class="btn-back" id="btnBack"><svg viewBox="0 0 24 24"><polyline points="15,6 9,12 15,18"/></svg> Back</button>
      <button class="btn-next" id="btnNext">Begin the walkthrough <svg viewBox="0 0 24 24"><polyline points="9,6 15,12 9,18"/></svg></button>
      <span class="keyhint"><kbd>space</kbd> next · <kbd>esc</kbd> skip</span>
    </div>
  </div>
</div>

<div class="reveal" id="reveal">
  <div class="inner">
    <div class="mk" id="revealMark"></div>
    <div class="eye">Founder-Driven Intelligence</div>
    <h2>Your intelligence dashboard is ready.</h2>
    <p id="revealSub"></p>
    <div class="axes-mini" id="revealAxes"></div>
    <div class="cta-row">
      <a class="cta" href="./dashboard.html">Enter the Intelligence Dashboard <svg viewBox="0 0 24 24"><polyline points="9,6 15,12 9,18"/></svg></a>
      <button class="replay" id="replayBtn">Replay the walkthrough</button>
    </div>
  </div>
</div>

<script src="./build-data.js"></script>
<script>
(function(){
  var D = window.BUILD_DATA;
  var REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var stage=document.getElementById('stage'), railEl=document.getElementById('rail'),
      revealEl=document.getElementById('reveal'), dock=document.querySelector('.dock'),
      btnNext=document.getElementById('btnNext'), btnBack=document.getElementById('btnBack'),
      netTip=document.getElementById('netTip');

  document.getElementById('brandMark').innerHTML=D.founder.logoSvg;
  document.getElementById('brandName').textContent=D.founder.name;
  document.getElementById('revealMark').innerHTML=D.founder.logoSvg;
  document.getElementById('revealSub').textContent='From '+fmt(D.scan.universe)+' rooftops down to a ranked shortlist, each account with its score, its evidence, and a warm path in where we have one.';
  document.getElementById('revealAxes').innerHTML=D.axes.map(function(a){return '<span class="axis-mini">'+a.name+'</span>';}).join('');

  var TICK=svg('<polyline points="20,6 9,17 4,12"/>');
  var ARROW=svg('<line x1="4" y1="12" x2="18" y2="12"/><polyline points="12,6 18,12 12,18"/>');
  function svg(inner){return '<svg viewBox="0 0 24 24">'+inner+'</svg>';}
  function fmt(n){return String(n).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
  function scl(){return REDUCED?.35:1;}
  function tween(from,to,dur,onU,onD){
    if(REDUCED){onU(to);if(onD)onD();return;}
    var t0=null; function step(ts){if(t0===null)t0=ts;var p=Math.min(1,(ts-t0)/dur);var e=1-Math.pow(1-p,3);onU(from+(to-from)*e);if(p<1)requestAnimationFrame(step);else if(onD)onD();}
    requestAnimationFrame(step);
  }
  function stagger(nodes,gap,fn){nodes.forEach(function(n,i){setTimeout(function(){fn(n,i);},REDUCED?0:i*gap);});}
  function qtier(t){return t==='high'?'q-high':(t==='med'?'q-med':'q-low');}
  function tierColor(t){return t==='high'?'var(--q-high)':t==='med'?'var(--q-med)':'var(--q-low)';}
  function tierFill(t){return t==='high'?'hsl(150 42% 30% / .28)':t==='med'?'hsl(38 60% 34% / .24)':'hsl(30 40% 34% / .2)';}
  function qsa(el,s){return Array.prototype.slice.call(el.querySelectorAll(s));}
  function ael(el){var a=el.querySelector('.act')||el.firstElementChild;if(a){a.classList.remove('enter');void a.offsetWidth;a.classList.add('enter');}}

  var SCENES=[
    {rail:null, html:coldHTML, enter:function(el){ael(el);}},
    {rail:0, html:processHTML, enter:processEnter},
    {rail:1, html:icpHTML, enter:icpEnter},
    {rail:2, html:axesHTML, enter:axesEnter},
    {rail:3, html:scanHTML, enter:scanEnter},
    {rail:4, html:evidenceHTML, enter:evidenceEnter},
    {rail:5, html:scoreHTML, enter:scoreEnter},
    {rail:6, html:shortlistHTML, enter:shortlistEnter},
    {rail:7, html:networkHTML, enter:networkEnter, lastContent:true},
    {rail:'done', html:function(){return '';}, enter:function(){showReveal();}, reveal:true}
  ];
  var railDefs=['Process','ICP','Signals','Scan','Evidence','Score','Shortlist','Network'];
  railEl.innerHTML=railDefs.map(function(l,i){return '<div class="seg" data-i="'+i+'"><div class="lbl"><span class="sn">'+(i+1)+'</span> '+l+'</div><div class="track"><div class="fill"></div></div></div>';}).join('');
  qsa(railEl,'.seg').forEach(function(s){s.addEventListener('click',function(){go(parseInt(s.getAttribute('data-i'),10)+1);});});

  /* ---------- scene HTML ---------- */
  function coldHTML(){return '<div class="act cold">'+
    '<div class="mk">'+D.founder.logoSvg+'</div>'+
    '<div class="eye">Primary · Founder-Driven Intelligence</div>'+
    '<h1>How we built <span class="accent">'+D.founder.name+'’s</span> sales intelligence dashboard</h1>'+
    '<p>Follow it end to end, from a blank market to a ranked, evidence-backed shortlist, with a warm path in where we have one. Go at your own pace.</p>'+
    '</div>';}

  function processHTML(){
    var LOGOS={'Exa Websets':'exa','Exa':'exa','Parallel':'parallel','Clay':'clay','SEC EDGAR':'sec','Sumble':'sumble','LinkedIn':'linkedin','Claude':'claude','Affinity':'affinity'};
    var stages=D.process.stages.map(function(s,i){
      var tools=s.tools.map(function(t){
        var lg=LOGOS[t]?'<img src="./assets/logos/'+LOGOS[t]+'.png" alt="">':'';
        return '<span class="ptool">'+lg+t+'</span>';
      }).join('');
      return '<div class="pstage pop"><div class="ps-n">'+(i+1)+'</div><div class="ps-name">'+s.stage+'</div><div class="ps-desc">'+s.desc+'</div><div class="ps-tools"><span class="ptl">Tools</span>'+tools+'</div></div>';
    }).join('');
    return act(1,'The process','This isn’t a list buy. It’s <span class="accent">hands-on research.</span>',
      D.process.lead,
      '<div class="pipe">'+stages+'</div><div class="pipe-foot">'+D.process.foot+'</div>');
  }
  function processEnter(el){ael(el);stagger(qsa(el,'.pstage'),180,function(n){n.classList.add('on');});}

  function icpHTML(){
    var reads=D.icp.read.map(function(r){return '<div class="read-item pop"><div class="t">'+r.label+'</div><div class="m">'+r.meta+'</div></div>';}).join('');
    var quals=D.icp.qualifier.map(function(q){return '<div class="qual-item"><span class="tick">'+TICK+'</span>'+q+'</div>';}).join('');
    return act(2,'Derive the ICP','We don’t guess who buys. We <span class="accent">immerse ourselves in the business and define the ICP.</span>',
      'We distill the founder’s memo and calls, the category, and our own market research into one clear, checkable definition of who is in-market.',
      '<div class="icp-grid"><div><div class="col-label">What we work from</div><div class="read-list">'+reads+'</div></div>'+
      '<div class="icp-arrow">'+ARROW+'</div>'+
      '<div><div class="col-label">The ICP qualifier</div><div class="qual-list">'+quals+'</div></div></div>'+
      '<div class="icp-foot"><span class="pill">Buyer: <b>'+D.icp.buyer+'</b></span><span class="pill">Geo: <b>'+D.icp.geo+'</b></span></div>');
  }
  function axesHTML(){
    var cards=D.axes.map(function(a){return '<div class="axis-card'+(a.key==='warranty'?' wow':'')+'"><div class="kind">'+a.kind+'</div><div class="nm">'+a.name+'</div><div class="wt">'+a.weight+'<span>%</span></div><div class="wt-track"><div class="wt-fill" data-w="'+a.weight+'"></div></div><div class="ms">'+a.measures+'</div></div>';}).join('');
    return act(3,'Build the signals','We build the <span class="accent">custom signals</span> that predict a ready buyer.',
      'Four signals, weighted for this founder. Warranty Burden reads sharpest: a group’s brand mix is public, so we can measure the pain before the first call.',
      '<div class="axes-row">'+cards+'</div>');
  }
  function scanHTML(){
    var dots='';for(var i=0;i<140;i++){dots+='<div class="dot"></div>';}
    var ex='<div class="ex-lead">Excluded up front: the software vendors who sell to dealers, not the dealers themselves.</div>'+D.scan.excludes.map(function(e){return '<span class="ex">'+e+'</span>';}).join('');
    return act(4,'Scan the market','We scan <span class="accent">the market</span>, US and Canada.',D.scan.query,
      '<div class="scan-wrap"><div class="scan-counter"><div class="n mono" id="scanN">0</div><div class="l" id="scanL">'+D.scan.universeLabel+'</div></div>'+
      '<div class="dot-grid" id="dotGrid">'+dots+'</div>'+
      '<div class="funnel" id="funnel">'+fstat(D.scan.universe,'rooftops',false)+farrow()+fstat(D.scan.groups,'multi-rooftop groups',false)+farrow()+fstat(D.scan.matched,'high-fit matches',true)+'</div>'+
      '<div class="scan-note">Many more clear the bar. We pull the strongest matches to enrich and score in depth, then curate the shortlist from there.</div>'+
      '<div class="excludes" id="excludes">'+ex+'</div></div>');
  }
  function evidenceHTML(){
    var cols=D.enrichments.map(function(e){return '<div class="ev-col"><span class="st">'+TICK+'</span><span class="f">'+e.field+'</span><span class="s">'+e.src+'</span></div>';}).join('');
    return act(5,'Pull the evidence','We <span class="accent">pull and cite the evidence</span> on every account.',
      'For each account we pull the rooftops, brand mix, DMS, current inspection tooling, open service roles from the job boards, and the name of the buyer, each backed by multiple tiered sources. Nothing ships uncited.',
      '<div class="ev-grid"><div><div class="col-label">Pulled for each account</div><div class="ev-cols">'+cols+'</div></div>'+
      '<div><div class="col-label">Every claim, sourced</div><div class="ev-feed"><div class="fh"><span class="dotpulse"></span> Evidence feed</div><div id="feedList">'+evidenceFeed()+'</div></div></div></div>');
  }
  function scoreHTML(){
    var hero=D.companies[0];
    var abars=D.axes.map(function(a){return '<div class="abar"><span class="an">'+a.name+'</span><div class="track"><div class="fill" data-v="'+hero.s[a.key]+'"></div></div><span class="av" data-v="'+hero.s[a.key]+'">0.0</span></div>';}).join('');
    return act(6,'Score 0 to 100','We <span class="accent">score every account</span>, 0 to 100.',
      'The four signals combine on this founder’s weights into a single 0-to-100 score. The priority tier comes straight from that number, so the label and the score always agree.',
      '<div class="score-wrap"><div class="formula"><b>0.35</b>·Warranty + <b>0.25</b>·Opportunity + <b>0.25</b>·Tooling + <b>0.15</b>·Hiring</div>'+
      '<div class="hero-score"><div><div class="hero-name">'+hero.name+'<span class="seg">'+hero.seg+'</span></div><div class="abars">'+abars+'</div></div>'+
      '<div class="score-arrow">'+ARROW+'</div>'+
      '<div class="composite"><div class="big"><span id="compN">0</span><span class="u">/100</span></div><div class="tier">HIGH</div></div></div>'+
      '<div class="score-cap">Every number backed by a cited source.</div></div>');
  }
  function shortlistHTML(){
    var rows=D.companies.map(function(c,i){return '<div class="row '+qtier(c.tier)+'" data-score="'+c.score+'"><span class="rk">'+(i+1)+'</span><span class="nm">'+c.name+'<span class="sg">'+c.seg+'</span></span><div class="track"><div class="fill"></div></div><span class="sc">0</span></div>';}).join('');
    var pcards=D.partners.map(function(p){return '<div class="pcard"><div class="pn">'+p.name+'</div><div class="ps">'+p.status+'</div><div class="pnote">'+p.note+'</div></div>';}).join('');
    return act(7,'Curate the shortlist','The accounts <span class="accent">worth walking into.</span>',
      'Ranked by score, grouped by priority, plus the design partners already signed. This is exactly what lands in the dashboard.',
      '<div class="ranked" id="ranked">'+rows+'</div><div class="partners"><div class="ph">Already signed &amp; onboarding</div><div class="prow" id="prow">'+pcards+'</div></div>');
  }
  function networkHTML(){
    return act(8,'Map the way in','We map the <span class="accent">warm paths in.</span>',
      'Primary’s network of partners, advisors, founders, and operators is where we source warm paths into the shortlist. Each line is a real relationship. Drag to pan, scroll to zoom, hover any node.',
      '<div class="net-wrap"><svg class="net-svg" id="netSvg" viewBox="0 0 1160 600"><g id="netZoom"></g></svg>'+
      '<div class="net-legend">'+
        '<div class="lg"><span class="ring" style="border-color:var(--text-mid)"></span> Primary connector</div>'+
        '<div class="lg lgh" style="margin-top:5px">Accounts</div>'+
        '<div class="lg"><span class="sw" style="background:var(--q-high)"></span> High priority</div>'+
        '<div class="lg"><span class="sw" style="background:var(--q-med)"></span> Mid priority</div>'+
        '<div class="lg"><span class="ring"></span> Multiple warm paths</div>'+
      '</div>'+
      '<div class="net-hint">node size = readiness score · drag · scroll · hover</div></div>'+
      '<div class="net-note">Illustrative warm-path layer. Populated per founder from Primary’s Affinity graph + team LinkedIn connections.</div>');
  }

  /* ---------- enter helpers ---------- */
  function icpEnter(el){ael(el);
    stagger(qsa(el,'.read-item'),260,function(n){n.classList.add('on');});
    var q=qsa(el,'.qual-item'); q.forEach(function(n){n.classList.add('pop');});
    setTimeout(function(){stagger(q,300,function(n){n.classList.add('on');});},700);
    setTimeout(function(){qsa(el,'.icp-foot .pill').forEach(function(n,i){n.classList.add('pop');setTimeout(function(){n.classList.add('on');},i*200);});},700+q.length*300);
  }
  function axesEnter(el){ael(el);
    var cards=qsa(el,'.axis-card'); cards.forEach(function(n){n.classList.add('pop');});
    stagger(cards,280,function(n){n.classList.add('on');var f=n.querySelector('.wt-fill');if(f)setTimeout(function(){f.style.width=f.getAttribute('data-w')+'%';},240);});
  }
  function scanEnter(el){ael(el);
    var dots=qsa(el,'.dot'), nEl=el.querySelector('#scanN'), lEl=el.querySelector('#scanL');
    tween(0,D.scan.universe,2200*scl(),function(v){nEl.textContent=fmt(Math.round(v));},function(){lEl.textContent='groups that run their own fixed-ops';});
    stagger(dots,9,function(n){n.classList.add('lit');});
    setTimeout(function(){
      var picks={3:1,11:1,19:1,27:1,38:1,44:1,52:1,61:1,70:1,79:1,88:1,96:1,105:1,118:1,129:1};
      dots.forEach(function(n,i){n.classList.remove('lit');if(picks[i])n.classList.add('match');else n.classList.add('dim');});
      tween(D.scan.universe,D.scan.matched,1100*scl(),function(v){nEl.textContent=fmt(Math.round(v));},function(){nEl.textContent=D.scan.matched;lEl.textContent='high-fit matches we research in depth';});
    },REDUCED?200:3200);
    setTimeout(function(){qsa(el,'.fstat').forEach(function(n,i){n.classList.add('pop');setTimeout(function(){n.classList.add('on');},i*240);});},REDUCED?100:900);
    setTimeout(function(){qsa(el,'.ex').forEach(function(n,i){setTimeout(function(){n.classList.add('struck');},i*120);});},REDUCED?200:4600);
  }
  function evidenceEnter(el){ael(el);
    qsa(el,'.ev-col').forEach(function(n){n.classList.add('pop');});
    stagger(qsa(el,'.ev-col'),200,function(n){n.classList.add('on');});
    var lines=qsa(el,'.feed-line'); lines.forEach(function(n){n.classList.add('pop');});
    var gap=REDUCED?0:460;
    lines.forEach(function(n,i){setTimeout(function(){n.classList.add('on');var list=el.querySelector('#feedList');if(!REDUCED&&list)list.scrollTop=list.scrollHeight;},i*gap);});
  }
  function scoreEnter(el){ael(el);
    var hero=D.companies[0];
    setTimeout(function(){qsa(el,'.abar').forEach(function(bar,i){var f=bar.querySelector('.fill'),av=bar.querySelector('.av'),v=parseFloat(f.getAttribute('data-v'));setTimeout(function(){f.style.width=(v/5*100)+'%';tween(0,v,800*scl(),function(x){av.textContent=x.toFixed(1);});},i*240);});},REDUCED?0:400);
    setTimeout(function(){var cn=el.querySelector('#compN');tween(0,hero.score,1300*scl(),function(x){cn.textContent=Math.round(x);});},REDUCED?0:1900);
  }
  function shortlistEnter(el){ael(el);
    var rows=qsa(el,'.row'), gap=REDUCED?0:210;
    rows.forEach(function(r,i){setTimeout(function(){r.classList.add('on');var s=parseInt(r.getAttribute('data-score'),10),f=r.querySelector('.fill'),num=r.querySelector('.sc');if(f)f.style.width=s+'%';tween(0,s,700*scl(),function(x){num.textContent=Math.round(x);});},i*gap);});
    setTimeout(function(){qsa(el,'.pcard').forEach(function(p,i){setTimeout(function(){p.classList.add('on');},i*170);});},REDUCED?100:rows.length*gap+250);
  }
  function evidenceFeed(){
    var f=[['1','SEC','Penske 2024 Form 10-K, 72% premium-brand revenue'],['2','Automotive News','2026 Top 150 Dealership Groups'],['1','Case study','Dealertrack + Xtime MPI at Ed Napleton'],['job','Careers','Group 1, 175 technician + 65 advisor reqs'],['2','CBT News','West Herr equipped ~650 techs with video MPI'],['1','Pon Holdings','indiGO ultra-luxury portfolio record'],['li','LinkedIn','Fixed Ops Director identified, 9 of 10 accounts'],['1','SEC','Group 1 2024 10-K, 145 US dealerships'],['2','Car Dealership Guy','Go Auto reaches 76 rooftops']];
    return f.map(function(x){var cls=x[0]==='1'?'t1':'t2';return '<div class="feed-line"><span class="tt '+cls+'">'+x[1]+'</span><span class="tx">'+x[2]+'</span></div>';}).join('');
  }
  function fstat(n,l,m){return '<div class="fstat'+(m?' match':'')+' pop"><div class="n mono">'+fmt(n)+'</div><div class="l">'+l+'</div></div>';}
  function farrow(){return '<span class="fa">'+ARROW+'</span>';}
  function act(n,eyebrow,title,narr,body){return '<div class="act"><div class="act-eyebrow"><span class="bar"></span><span class="step-n">0'+n+'</span> '+eyebrow+' <span class="bar"></span></div><h2 class="act-title">'+title+'</h2><p class="act-narr">'+narr+'</p><div class="act-body">'+body+'</div></div>';}

  /* ---------- NETWORK MAP: Primary's connectors -> warm paths INTO the ICP accounts ----------
     (radial layout adapted from the Lyric Network Map; pure SVG, no deps) */
  var NS='http://www.w3.org/2000/svg';
  function mk(t,at){var e=document.createElementNS(NS,t);for(var k in at)e.setAttribute(k,at[k]);return e;}
  function tipShow(e,html){netTip.innerHTML=html;netTip.classList.add('on');var x=e.clientX+14,y=e.clientY+14;if(x+272>window.innerWidth)x=e.clientX-276;netTip.style.left=x+'px';netTip.style.top=y+'px';}
  function tipHide(){netTip.classList.remove('on');}
  function shortName(a){return a.replace(/ (Automotive |Auto )?Group$/,'').replace(/ Automotive$/,'');}
  function initials(s){return s.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();}
  function flowDots(layer,x1,y1,x2,y2,cls,n){
    if(REDUCED)return;
    var dist=Math.hypot(x2-x1,y2-y1),dur=2.4*Math.max(1.5,Math.min(2.8,dist/120));
    for(var i=0;i<n;i++){
      var c=mk('circle',{r:2.4,fill:cls,'fill-opacity':.95});
      c.appendChild(mk('animate',{attributeName:'cx',values:x1+';'+x2,dur:dur+'s',begin:(-i*dur/n)+'s',repeatCount:'indefinite',calcMode:'linear'}));
      c.appendChild(mk('animate',{attributeName:'cy',values:y1+';'+y2,dur:dur+'s',begin:(-i*dur/n)+'s',repeatCount:'indefinite',calcMode:'linear'}));
      layer.appendChild(c);
    }
  }
  function renderNet(el){
    var svgEl=el.querySelector('#netSvg'), zoomG=el.querySelector('#netZoom');
    zoomG.innerHTML='';
    var cx=580, cy=300, Rx=400, Ry=235, R1x=205, R1y=128;
    var byName={}; D.companies.forEach(function(c){byName[c.name]=c;});
    var cons=D.network.connectors, also=D.network.alsoReaches||{};
    // clean, full-enough account labels (avoids a bare "Group 1")
    var SHORT={"Penske Automotive Group":"Penske","Group 1 Automotive":"Group 1 Automotive","indiGO Auto Group":"indiGO","Fields Auto Group":"Fields","Krause Auto Group":"Krause","Ed Napleton Automotive Group":"Ed Napleton","Castle Automotive Group":"Castle","West Herr Auto Group":"West Herr","Go Auto":"Go Auto","AutoCanada":"AutoCanada"};
    // cool palette — connectors read as a distinct layer from the warm (green/amber) accounts
    var palette={pp:'hsl(214 82% 64%)',aa:'hsl(190 70% 54%)',pf:'hsl(266 74% 70%)',on:'hsl(168 60% 52%)'};
    // each connector owns a fixed angular sector; its accounts fan inside it -> no crossing
    var sectorAng={pp:-Math.PI/2,pf:0,on:Math.PI/2,aa:Math.PI};
    var pos={}, pathsOf={}, hub={};
    cons.forEach(function(c){ c.accounts.forEach(function(a){(pathsOf[a]=pathsOf[a]||[]).push(c);}); });
    Object.keys(also).forEach(function(a){ also[a].forEach(function(k){ var c=cons.filter(function(x){return x.key===k;})[0]; if(c)(pathsOf[a]=pathsOf[a]||[]).push(c); }); });
    cons.forEach(function(c){
      var base=sectorAng[c.key]||0;
      hub[c.key]={x:cx+R1x*Math.cos(base),y:cy+R1y*Math.sin(base),color:palette[c.key]||'hsl(214 80% 64%)'};
      var n=c.accounts.length, fan=n>=3?0.62:(n===2?0.42:0);
      c.accounts.forEach(function(a,j){var aa=base-fan+(n>1?2*fan*(j/(n-1)):0);pos[a]={x:cx+Rx*Math.cos(aa),y:cy+Ry*Math.sin(aa),a:aa};});
    });
    var flow=mk('g',{}); zoomG.appendChild(flow);
    // faint guide ellipse (polish)
    zoomG.appendChild(mk('ellipse',{cx:cx,cy:cy,rx:Rx,ry:Ry,fill:'none',stroke:'var(--border)','stroke-opacity':.26}));
    // edges: center -> hub, hub -> its accounts (all within-sector; nothing crosses)
    cons.forEach(function(c){
      var h=hub[c.key];
      zoomG.appendChild(mk('line',{x1:cx,y1:cy,x2:h.x,y2:h.y,stroke:h.color,'stroke-width':2.4,'stroke-opacity':.55,'stroke-linecap':'round'}));
      flowDots(flow,cx,cy,h.x,h.y,h.color,2);
      c.accounts.forEach(function(a){var p=pos[a];if(!p)return;zoomG.appendChild(mk('line',{x1:h.x,y1:h.y,x2:p.x,y2:p.y,stroke:h.color,'stroke-width':1.8,'stroke-opacity':.36,'stroke-linecap':'round'}));});
    });
    // account nodes
    Object.keys(pos).forEach(function(a){
      var co=byName[a], p=pos[a]; if(!co)return;
      var paths=pathsOf[a]||[], multi=paths.length>1;
      var col=tierColor(co.tier), rad=Math.max(14,Math.min(30,14+(co.score-70)/23*16));
      var g=mk('g',{class:'net-node'});
      if(multi) g.appendChild(mk('circle',{cx:p.x,cy:p.y,r:rad+5,fill:'none',stroke:'var(--amber-light)','stroke-width':1.7,'stroke-opacity':.9}));
      g.appendChild(mk('circle',{cx:p.x,cy:p.y,r:rad,fill:tierFill(co.tier),stroke:col,'stroke-width':2}));
      var sn=mk('text',{x:p.x,y:p.y+4,'text-anchor':'middle','font-size':11,'font-weight':600,fill:'var(--text)',style:'font-family:var(--font-mono)'});sn.textContent=co.score;g.appendChild(sn);
      var below=Math.sin(p.a)>=-0.15, ly=below?p.y+rad+15:p.y-rad-9;
      var lbl=mk('text',{x:p.x,y:ly,'text-anchor':'middle','font-size':11,'font-weight':500,fill:'var(--text-mid)'});lbl.textContent=SHORT[a]||shortName(a);g.appendChild(lbl);
      g.addEventListener('mousemove',function(e){
        var via=paths.map(function(c){return c.role;}).join(', ')||'no mapped path yet';
        var html='<div class="tn">'+a+'</div><div class="tmeta">'+co.seg+' · score '+co.score+' / 100</div>'+
          (co.contact?'<div class="tby">Buyer: <b>'+co.contact.name+'</b><br>'+co.contact.title+'</div>':'')+
          '<div class="tby">Warm path'+(multi?'s ('+paths.length+')':'')+' via <b>'+via+'</b></div>';
        tipShow(e,html);
      });
      g.addEventListener('mouseleave',tipHide);
      zoomG.appendChild(g);
    });
    // connector hubs (above edges) — initials only; roles live in the legend
    cons.forEach(function(c){
      var h=hub[c.key];
      var g=mk('g',{class:'net-node'});
      g.appendChild(mk('circle',{cx:h.x,cy:h.y,r:24,fill:'var(--surface-2)',stroke:h.color,'stroke-width':2.6}));
      var t=mk('text',{x:h.x,y:h.y+4,'text-anchor':'middle','font-size':12,'font-weight':700,fill:h.color});t.textContent=initials(c.role);g.appendChild(t);
      var base=sectorAng[c.key]||0, rAbove=Math.sin(base)<-0.3, rly=rAbove?h.y-24-11:h.y+24+16;
      var rl=mk('text',{x:h.x,y:rly,'text-anchor':'middle','font-size':11.5,'font-weight':600,fill:h.color});rl.textContent=c.role;g.appendChild(rl);
      g.addEventListener('mousemove',function(e){tipShow(e,'<div class="tn">'+c.role+'</div><div class="tby">Warm paths into <b>'+c.accounts.length+'</b> shortlist accounts</div>');});
      g.addEventListener('mouseleave',tipHide);
      zoomG.appendChild(g);
    });
    // center: Primary
    zoomG.appendChild(mk('circle',{cx:cx,cy:cy,r:44,fill:'var(--surface-2)',stroke:'var(--amber)','stroke-width':2.6,style:'filter:drop-shadow(0 0 24px hsl(36 92% 50% / .42))'}));
    var lt=mk('text',{x:cx,y:cy+2,'text-anchor':'middle','font-size':19,'font-weight':700,fill:'var(--text)',style:'font-family:var(--font-display)'});lt.textContent=D.network.hub||'Primary';zoomG.appendChild(lt);
    var lp=mk('text',{x:cx,y:cy+18,'text-anchor':'middle','font-size':9,'font-weight':500,fill:'var(--text-muted)'});lp.textContent='the network';zoomG.appendChild(lp);
    // pan / zoom
    var view={k:1,x:0,y:0};
    function apply(){zoomG.setAttribute('transform','translate('+view.x+' '+view.y+') scale('+view.k+')');}
    function toVB(clientX,clientY){var r=svgEl.getBoundingClientRect(),vb=svgEl.viewBox.baseVal;return {x:(clientX-r.left)/r.width*vb.width,y:(clientY-r.top)/r.height*vb.height};}
    svgEl.addEventListener('wheel',function(e){e.preventDefault();var pt=toVB(e.clientX,e.clientY);
      // factor scales with scroll delta (smooth), then clamp per event so trackpad pinches stay gentle
      var f=Math.exp(-e.deltaY*0.0012); f=Math.max(0.94,Math.min(1.06,f));
      var nk=Math.max(0.55,Math.min(3.2,view.k*f)); f=nk/view.k;
      view.x=pt.x-(pt.x-view.x)*f;view.y=pt.y-(pt.y-view.y)*f;view.k=nk;apply();},{passive:false});
    var drag=null;
    svgEl.addEventListener('mousedown',function(e){drag={x:e.clientX,y:e.clientY};svgEl.classList.add('grabbing');});
    svgEl.addEventListener('mousemove',function(e){if(!drag)return;var a=toVB(e.clientX,e.clientY),b=toVB(drag.x,drag.y);view.x+=a.x-b.x;view.y+=a.y-b.y;drag.x=e.clientX;drag.y=e.clientY;apply();});
    function endDrag(){drag=null;svgEl.classList.remove('grabbing');}
    svgEl.addEventListener('mouseup',endDrag);
    svgEl.addEventListener('mouseleave',endDrag);
  }
  function networkEnter(el){ael(el); tipHide(); setTimeout(function(){renderNet(el);},REDUCED?0:120);}

  /* ---------- manual scheduler ---------- */
  var cur=-1;
  function setRail(i){
    qsa(railEl,'.seg').forEach(function(s,idx){
      var fill=s.querySelector('.fill'); s.classList.remove('active','done');
      if(i==='done'){s.classList.add('done');fill.style.width='100%';return;}
      if(typeof i!=='number'){fill.style.width='0%';return;}
      if(idx<i){s.classList.add('done');fill.style.width='100%';}
      else if(idx===i){s.classList.add('active');fill.style.width='100%';}
      else{fill.style.width='0%';}
    });
  }
  function setControls(i){
    var s=SCENES[i];
    if(s.reveal){dock.style.display='none';return;}
    dock.style.display='';
    btnBack.hidden=(i<=0);
    var label=(i===0)?'Begin the walkthrough':(s.lastContent?'See the finished dashboard':'Continue');
    btnNext.innerHTML=label+' <svg viewBox="0 0 24 24"><polyline points="9,6 15,12 9,18"/></svg>';
  }
  function go(i){
    if(i<0||i>=SCENES.length)return;
    cur=i; var s=SCENES[i]; tipHide();
    if(s.reveal){setRail('done');setControls(i);s.enter(stage);return;}
    hideReveal();
    stage.innerHTML=s.html();
    setRail(s.rail);
    setControls(i);
    if(s.enter)s.enter(stage);
    stage.scrollTop=0;
  }
  function next(){if(cur<SCENES.length-1)go(cur+1);}
  function back(){if(cur>0)go(cur-1);}
  function toDashboard(){window.location.href='./dashboard.html';}

  function showReveal(){revealEl.classList.add('show');}
  function hideReveal(){revealEl.classList.remove('show');}
  document.getElementById('replayBtn').addEventListener('click',function(){hideReveal();go(0);});
  btnNext.addEventListener('click',next);
  btnBack.addEventListener('click',back);
  document.addEventListener('keydown',function(e){
    if(e.key===' '||e.key==='ArrowRight'){e.preventDefault();next();}
    else if(e.key==='ArrowLeft'||e.key==='Backspace'){e.preventDefault();back();}
    else if(e.key==='Escape'){toDashboard();}
  });

  // optional ?act=N deep-link (QA + demo: jump straight to a step)
  var start=0, m=location.search.match(/[?&]act=(\d+)/);
  if(m){var ai=parseInt(m[1],10); if(ai>=0&&ai<SCENES.length)start=ai;}
  go(start);
})();
</script>
