<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How we built Lantern's target map · Primary FDI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Newsreader:opsz,wght@6..72,500;6..72,600;6..72,700&display=swap" rel="stylesheet">
<style>
:root{
  --amber:hsl(36 92% 50%); --amber-light:hsl(40 96% 62%); --amber-dark:hsl(34 90% 42%); --amber-deep:hsl(30 80% 30%);
  --amber-tint:hsl(36 92% 50% / .12);
  --bg:hsl(28 14% 7%); --bg-2:hsl(26 16% 9%); --surface:hsl(30 13% 11%); --surface-2:hsl(30 12% 14%);
  --border:hsl(34 18% 20%); --border-soft:hsl(34 14% 17%);
  --text:hsl(40 30% 96%); --text-mid:hsl(38 16% 78%); --text-muted:hsl(36 12% 62%); --text-faint:hsl(34 10% 48%);
  /* score-quality (v2: green best / amber below, NO red) */
  --q-high:hsl(150 58% 52%); --q-high-d:hsl(150 46% 40%);
  --q-med:hsl(38 95% 56%);  --q-med-d:hsl(34 90% 44%);
  --q-low:hsl(30 42% 52%);  --q-low-d:hsl(30 34% 42%);
  --font-sans:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif;
  --font-display:'Newsreader',Georgia,'Times New Roman',serif;
  --font-mono:'JetBrains Mono',ui-monospace,'SF Mono',Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow:hidden;}
a{color:inherit;text-decoration:none;}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}

/* ambient */
.glow-field{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.glow-field::before{content:"";position:absolute;top:-24%;left:50%;width:1200px;height:1200px;transform:translateX(-50%);
  background:radial-gradient(circle at center,hsl(36 92% 50% / .16) 0%,hsl(34 90% 42% / .07) 32%,transparent 62%);filter:blur(10px);
  animation:breathe 7s ease-in-out infinite;}
.glow-field::after{content:"";position:absolute;bottom:-30%;left:-12%;width:800px;height:800px;
  background:radial-gradient(circle at center,hsl(30 80% 30% / .14) 0%,transparent 64%);}
@keyframes breathe{0%,100%{opacity:.8;}50%{opacity:1;}}
.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.5;
  background-image:radial-gradient(hsl(40 30% 96% / .022) 1px,transparent 1px);background-size:3px 3px;}

/* topbar */
.topbar{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;align-items:center;justify-content:space-between;height:60px;padding:0 34px;}
.brand{display:flex;align-items:center;gap:11px;}
.logo-mark{width:26px;height:26px;background:var(--text);display:flex;align-items:center;justify-content:center;border-radius:4px;flex-shrink:0;}
.logo-mark svg{width:17px;height:17px;stroke:var(--amber);stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.brand .nm{font-size:14px;font-weight:600;letter-spacing:-.01em;}
.brand .x{color:var(--amber);font-weight:500;margin:0 5px;}
.brand .pv{color:var(--text-mid);font-weight:500;}
.skip{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:500;color:var(--text-faint);border:1px solid var(--border-soft);border-radius:8px;padding:7px 13px;transition:color 150ms,border-color 150ms;}
.skip:hover{color:var(--text-mid);border-color:var(--border);}
.skip svg{width:13px;height:13px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round;}

/* stage */
.stage{position:fixed;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;padding:78px 34px 96px;}
.stage-inner{width:100%;max-width:1080px;position:relative;}
.act{opacity:0;}
.act.enter{animation:fadeUp .7s cubic-bezier(.16,.84,.44,1) forwards;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.act-eyebrow{display:flex;align-items:center;gap:10px;justify-content:center;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);font-weight:600;margin-bottom:16px;}
.act-eyebrow .step-n{font-family:var(--font-mono);color:var(--text-faint);}
.act-eyebrow .bar{width:22px;height:1px;background:hsl(36 92% 50% / .5);}
.act-title{font-family:var(--font-display);font-size:34px;font-weight:600;letter-spacing:-.02em;line-height:1.16;text-align:center;max-width:840px;margin:0 auto 12px;}
.act-title .accent{color:var(--amber-light);}
.act-narr{font-size:15.5px;line-height:1.55;color:var(--text-muted);text-align:center;max-width:640px;margin:0 auto 40px;}
.act-body{}

/* generic pieces */
.chip{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px 15px;font-size:14px;color:var(--text-mid);}
.chip .tick{width:16px;height:16px;flex-shrink:0;color:var(--q-high);}
.chip .tick svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.6;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.pop{opacity:0;transform:translateY(10px) scale(.98);}
.pop.on{animation:pop .5s cubic-bezier(.16,.84,.44,1) forwards;}
@keyframes pop{to{opacity:1;transform:none;}}

/* act 1 ICP */
.icp-grid{display:grid;grid-template-columns:1fr 44px 1.15fr;gap:26px;align-items:center;max-width:900px;margin:0 auto;}
.col-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);margin-bottom:14px;font-weight:600;}
.read-list,.qual-list{display:flex;flex-direction:column;gap:10px;}
.read-item{background:var(--surface);border:1px solid var(--border-soft);border-radius:11px;padding:13px 15px;}
.read-item .t{font-size:14px;font-weight:600;color:var(--text);}
.read-item .m{font-size:12px;color:var(--text-faint);margin-top:3px;}
.icp-arrow{display:flex;align-items:center;justify-content:center;color:var(--amber);}
.icp-arrow svg{width:30px;height:30px;stroke:currentColor;stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.qual-item{display:flex;align-items:center;gap:11px;background:linear-gradient(165deg,var(--surface-2),var(--surface));border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;color:var(--text-mid);}
.qual-item .tick{width:17px;height:17px;color:var(--q-high);flex-shrink:0;}
.qual-item .tick svg{width:17px;height:17px;stroke:currentColor;stroke-width:2.6;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.icp-foot{display:flex;gap:12px;justify-content:center;margin-top:30px;flex-wrap:wrap;}
.icp-foot .pill{font-size:12.5px;color:var(--text-mid);background:var(--amber-tint);border:1px solid hsl(36 92% 50% / .3);border-radius:999px;padding:7px 15px;}
.icp-foot .pill b{color:var(--amber-light);font-weight:600;}

/* act 2 signals */
.axes-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;max-width:960px;margin:0 auto;}
.axis-card{position:relative;background:linear-gradient(165deg,var(--surface-2),var(--surface));border:1px solid var(--border);border-radius:14px;padding:20px 18px;overflow:hidden;}
.axis-card.wow{border-color:hsl(36 92% 50% / .5);box-shadow:0 0 0 1px hsl(36 92% 50% / .25),0 0 34px hsl(36 92% 50% / .14);}
.axis-card .kind{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);font-weight:600;margin-bottom:10px;}
.axis-card.wow .kind{color:var(--amber);}
.axis-card .nm{font-size:16px;font-weight:600;letter-spacing:-.01em;margin-bottom:4px;}
.axis-card .wt{font-family:var(--font-mono);font-size:30px;font-weight:600;color:var(--amber-light);letter-spacing:-.02em;line-height:1;margin:12px 0 4px;}
.axis-card .wt span{font-size:14px;color:var(--text-faint);}
.axis-card .ms{font-size:12.5px;line-height:1.5;color:var(--text-muted);margin-top:8px;min-height:54px;}
.wt-track{height:4px;border-radius:3px;background:var(--border-soft);overflow:hidden;margin-top:6px;}
.wt-fill{height:100%;width:0;border-radius:3px;background:linear-gradient(90deg,var(--amber-dark),var(--amber-light));transition:width 1.1s cubic-bezier(.16,.84,.44,1);}
.axes-note{text-align:center;font-size:13px;color:var(--text-muted);margin-top:26px;max-width:640px;margin-left:auto;margin-right:auto;}
.axes-note code{font-family:var(--font-mono);font-size:11.5px;color:var(--amber-light);background:var(--amber-tint);padding:2px 7px;border-radius:5px;}

/* act 3 scan */
.scan-wrap{max-width:900px;margin:0 auto;}
.scan-counter{text-align:center;margin-bottom:22px;}
.scan-counter .n{font-family:var(--font-mono);font-size:56px;font-weight:600;color:var(--text);letter-spacing:-.03em;line-height:1;}
.scan-counter .l{font-size:13px;color:var(--text-muted);margin-top:8px;letter-spacing:.02em;}
.dot-grid{display:grid;grid-template-columns:repeat(28,1fr);gap:6px;max-width:720px;margin:0 auto 24px;}
.dot{width:100%;aspect-ratio:1;border-radius:50%;background:var(--border-soft);opacity:.4;transition:opacity .3s,background .3s,box-shadow .3s;}
.dot.lit{opacity:1;background:hsl(36 60% 40%);}
.dot.match{opacity:1;background:var(--amber);box-shadow:0 0 8px hsl(36 92% 50% / .8);}
.dot.dim{opacity:.16;background:var(--border-soft);box-shadow:none;}
.funnel{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:20px;}
.fstat{text-align:center;background:var(--surface);border:1px solid var(--border-soft);border-radius:11px;padding:12px 18px;min-width:120px;}
.fstat .n{font-family:var(--font-mono);font-size:24px;font-weight:600;color:var(--amber-light);line-height:1;}
.fstat.match .n{color:var(--q-high);}
.fstat .l{font-size:11px;color:var(--text-muted);margin-top:6px;}
.funnel .fa{color:var(--text-faint);}
.funnel .fa svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.excludes{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:760px;margin:0 auto;}
.ex-lead{width:100%;text-align:center;font-size:12px;color:var(--text-faint);margin-bottom:4px;letter-spacing:.02em;}
.ex{font-size:12px;color:var(--text-muted);border:1px solid var(--border-soft);border-radius:7px;padding:5px 10px;position:relative;transition:color .3s,opacity .3s;}
.ex.struck{color:var(--text-faint);opacity:.55;}
.ex.struck::after{content:"";position:absolute;left:8px;right:8px;top:50%;height:1px;background:var(--amber-dark);transform:scaleX(0);transform-origin:left;animation:strike .35s forwards;}
@keyframes strike{to{transform:scaleX(1);}}

/* act 4 evidence */
.ev-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:24px;max-width:940px;margin:0 auto;align-items:start;}
.ev-cols{display:flex;flex-direction:column;gap:9px;}
.ev-col{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border-soft);border-radius:10px;padding:11px 14px;}
.ev-col .st{width:15px;height:15px;color:var(--q-high);flex-shrink:0;}
.ev-col .st svg{width:15px;height:15px;stroke:currentColor;stroke-width:2.6;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.ev-col .f{font-size:13.5px;font-weight:600;color:var(--text);flex:1;}
.ev-col .s{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);}
.ev-feed{background:hsl(28 16% 6%);border:1px solid var(--border-soft);border-radius:13px;padding:16px 16px 6px;height:352px;overflow:hidden;position:relative;}
.ev-feed .fh{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.ev-feed .fh .dotpulse{width:7px;height:7px;border-radius:50%;background:var(--q-high);box-shadow:0 0 8px var(--q-high);animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.feed-line{display:flex;align-items:baseline;gap:9px;font-size:12px;line-height:1.4;padding:6px 0;border-bottom:1px solid var(--border-soft);opacity:0;transform:translateY(6px);}
.feed-line.on{animation:pop .4s forwards;}
.feed-line .tt{font-family:var(--font-mono);font-size:9.5px;font-weight:600;padding:2px 6px;border-radius:4px;flex-shrink:0;letter-spacing:.03em;}
.feed-line .t1{background:hsl(150 40% 30% / .3);color:var(--q-high);}
.feed-line .t2{background:var(--amber-tint);color:var(--amber-light);}
.feed-line .tx{color:var(--text-mid);}

/* act 5 score */
.score-wrap{max-width:900px;margin:0 auto;}
.formula{text-align:center;font-family:var(--font-mono);font-size:14px;color:var(--text-mid);margin-bottom:28px;letter-spacing:.01em;}
.formula b{color:var(--amber-light);font-weight:600;}
.hero-score{display:grid;grid-template-columns:1.3fr 46px .9fr;gap:22px;align-items:center;max-width:820px;margin:0 auto;}
.hero-name{font-size:15px;font-weight:600;margin-bottom:4px;}
.hero-name .seg{font-size:11px;color:var(--text-faint);font-weight:500;margin-left:8px;}
.abars{display:flex;flex-direction:column;gap:9px;margin-top:12px;}
.abar{display:grid;grid-template-columns:96px 1fr 30px;align-items:center;gap:10px;}
.abar .an{font-size:11.5px;color:var(--text-muted);text-align:right;}
.abar .track{height:8px;border-radius:4px;background:var(--border-soft);overflow:hidden;}
.abar .fill{height:100%;width:0;border-radius:4px;background:linear-gradient(90deg,var(--amber-dark),var(--amber-light));transition:width .9s cubic-bezier(.16,.84,.44,1);}
.abar .av{font-family:var(--font-mono);font-size:12px;color:var(--text-mid);text-align:right;}
.score-arrow{display:flex;align-items:center;justify-content:center;color:var(--amber);}
.score-arrow svg{width:30px;height:30px;stroke:currentColor;stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.composite{text-align:center;background:linear-gradient(165deg,var(--surface-2),var(--surface));border:1px solid var(--border);border-radius:16px;padding:22px 18px;}
.composite .big{font-family:var(--font-mono);font-size:58px;font-weight:600;line-height:1;letter-spacing:-.03em;color:var(--q-high);}
.composite .big .u{font-size:20px;color:var(--text-faint);}
.composite .tier{display:inline-block;margin-top:12px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border-radius:7px;background:hsl(150 40% 30% / .25);color:var(--q-high);}
.score-cap{text-align:center;font-size:13px;color:var(--text-muted);margin-top:26px;}

/* act 6 ranked list */
.ranked{max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:6px;}
.row{display:grid;grid-template-columns:22px 1fr 150px 52px;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border-soft);border-radius:10px;padding:9px 14px;opacity:0;transform:translateX(-8px);}
.row.on{animation:rowin .5s cubic-bezier(.16,.84,.44,1) forwards;}
@keyframes rowin{to{opacity:1;transform:none;}}
.row .rk{font-family:var(--font-mono);font-size:12px;color:var(--text-faint);text-align:center;}
.row .nm{font-size:13.5px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.row .nm .sg{font-size:10.5px;color:var(--text-faint);font-weight:500;margin-left:7px;}
.row .track{height:7px;border-radius:4px;background:var(--border-soft);overflow:hidden;}
.row .fill{height:100%;width:0;border-radius:4px;transition:width .8s cubic-bezier(.16,.84,.44,1);}
.row .sc{font-family:var(--font-mono);font-size:15px;font-weight:600;text-align:right;}
.q-high .fill{background:linear-gradient(90deg,var(--q-high-d),var(--q-high));} .q-high .sc{color:var(--q-high);}
.q-med .fill{background:linear-gradient(90deg,var(--q-med-d),var(--q-med));} .q-med .sc{color:var(--q-med);}
.q-low .fill{background:linear-gradient(90deg,var(--q-low-d),var(--q-low));} .q-low .sc{color:var(--q-low);}
.partners{max-width:720px;margin:20px auto 0;}
.partners .ph{text-align:center;font-size:12px;color:var(--text-faint);letter-spacing:.04em;margin-bottom:10px;}
.prow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.pcard{background:linear-gradient(165deg,var(--surface-2),var(--surface));border:1px solid hsl(36 92% 50% / .3);border-radius:11px;padding:11px 15px;min-width:180px;opacity:0;}
.pcard.on{animation:pop .5s forwards;}
.pcard .pn{font-size:13.5px;font-weight:600;}
.pcard .ps{font-size:11px;color:var(--amber-light);margin-top:3px;}
.pcard .pnote{font-size:11px;color:var(--text-faint);margin-top:5px;line-height:1.4;}

/* cold open + reveal */
.cold{text-align:center;}
.cold .mk{width:104px;height:104px;margin:0 auto 30px;border-radius:24px;background:linear-gradient(160deg,var(--surface-2),var(--surface));border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 1px hsl(36 92% 50% / .2),0 0 66px hsl(36 92% 50% / .3);animation:lantern 4.2s ease-in-out infinite;}
.cold .mk svg{width:66px;height:66px;stroke:var(--amber);stroke-width:1.4;fill:none;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 14px hsl(36 92% 50% / .55));}
@keyframes lantern{0%,100%{box-shadow:0 0 0 1px hsl(36 92% 50% / .18),0 0 52px hsl(36 92% 50% / .2);}50%{box-shadow:0 0 0 1px hsl(36 92% 50% / .3),0 0 92px hsl(36 92% 50% / .36);}}
.cold .eye{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);font-weight:600;margin-bottom:18px;}
.cold h1{font-family:var(--font-display);font-size:44px;font-weight:600;letter-spacing:-.02em;line-height:1.12;max-width:760px;margin:0 auto 16px;}
.cold h1 .accent{color:var(--amber-light);}
.cold p{font-size:16px;color:var(--text-muted);max-width:560px;margin:0 auto;line-height:1.55;}

/* progress rail */
.rail{position:fixed;left:0;right:0;bottom:0;z-index:5;padding:16px 34px 20px;background:linear-gradient(0deg,var(--bg) 40%,transparent);}
.rail-inner{max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:14px;}
.seg{flex:1;}
.seg .lbl{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-faint);margin-bottom:6px;transition:color .3s;display:flex;align-items:center;gap:6px;}
.seg.active .lbl,.seg.done .lbl{color:var(--text-mid);}
.seg.active .lbl{color:var(--amber);}
.seg .lbl .sn{font-family:var(--font-mono);}
.seg .track{height:3px;border-radius:2px;background:var(--border-soft);overflow:hidden;}
.seg .fill{height:100%;width:0;background:linear-gradient(90deg,var(--amber-dark),var(--amber-light));border-radius:2px;}
.rail .hint{flex-shrink:0;font-size:11px;color:var(--text-faint);letter-spacing:.03em;padding-left:6px;}
.rail .hint kbd{font-family:var(--font-mono);background:var(--surface);border:1px solid var(--border-soft);border-radius:4px;padding:1px 5px;font-size:10px;color:var(--text-muted);}

/* reveal overlay */
.reveal{position:fixed;inset:0;z-index:8;background:hsl(28 16% 6% / .92);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .6s;}
.reveal.show{opacity:1;pointer-events:auto;}
.reveal .inner{text-align:center;max-width:640px;padding:0 30px;transform:translateY(14px);transition:transform .7s cubic-bezier(.16,.84,.44,1);}
.reveal.show .inner{transform:none;}
.reveal .mk{width:96px;height:96px;margin:0 auto 26px;border-radius:22px;background:linear-gradient(160deg,var(--surface-2),var(--surface));border:1px solid var(--border);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 1px hsl(36 92% 50% / .25),0 0 70px hsl(36 92% 50% / .34);animation:lantern 4.2s ease-in-out infinite;}
.reveal .mk svg{width:60px;height:60px;stroke:var(--amber);stroke-width:1.4;fill:none;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 14px hsl(36 92% 50% / .55));}
.reveal .eye{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);font-weight:600;margin-bottom:16px;}
.reveal h2{font-family:var(--font-display);font-size:38px;font-weight:600;letter-spacing:-.02em;line-height:1.14;margin-bottom:14px;}
.reveal p{font-size:16px;color:var(--text-muted);line-height:1.55;margin-bottom:14px;}
.reveal .axes-mini{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:30px;}
.reveal .axis-mini{font-size:11px;color:var(--text-mid);background:var(--amber-tint);border:1px solid hsl(36 92% 50% / .28);border-radius:6px;padding:5px 11px;}
.reveal .cta-row{display:flex;flex-direction:column;align-items:center;gap:14px;}
.cta{display:inline-flex;align-items:center;gap:11px;padding:14px 28px;border-radius:11px;font-size:15px;font-weight:600;letter-spacing:-.01em;color:hsl(28 40% 8%);
  background:linear-gradient(180deg,var(--amber-light),var(--amber));box-shadow:0 0 0 1px hsl(36 92% 50% / .45),0 8px 26px hsl(36 92% 50% / .28),inset 0 1px 0 hsl(45 100% 80% / .6);transition:transform .16s,box-shadow .16s;}
.cta:hover{transform:translateY(-2px);box-shadow:0 0 0 1px hsl(36 92% 50% / .65),0 16px 44px hsl(36 92% 50% / .42);}
.cta svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.3;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.replay{font-size:13px;color:var(--text-faint);cursor:pointer;background:none;border:none;transition:color .15s;}
.replay:hover{color:var(--text-mid);}

@media (max-width:900px){
  .act-title{font-size:26px;}
  .icp-grid,.hero-score{grid-template-columns:1fr;gap:18px;}
  .icp-arrow,.score-arrow{transform:rotate(90deg);}
  .axes-row{grid-template-columns:repeat(2,1fr);}
  .ev-grid{grid-template-columns:1fr;} .ev-feed{height:240px;}
  .dot-grid{grid-template-columns:repeat(20,1fr);}
  .row{grid-template-columns:20px 1fr 44px;} .row .track{display:none;}
  .rail .hint{display:none;}
  .cold h1{font-size:32px;} .reveal h2{font-size:28px;}
}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;}
  .act{opacity:1!important;}
}
</style>
</head>
<body>
<div class="glow-field"></div>
<div class="grain"></div>

<header class="topbar">
  <div class="brand">
    <div class="logo-mark" id="brandMark"></div>
    <span class="nm"><span id="brandName">Lantern</span><span class="x">×</span><span class="pv">Primary</span></span>
  </div>
  <a class="skip" href="./dashboard.html">Skip intro <svg viewBox="0 0 24 24"><polyline points="9,6 15,12 9,18"/></svg></a>
</header>

<div class="stage"><div class="stage-inner" id="stage"></div></div>

<div class="rail"><div class="rail-inner" id="rail"></div></div>

<div class="reveal" id="reveal">
  <div class="inner">
    <div class="mk" id="revealMark"></div>
    <div class="eye">Founder-Driven Intelligence</div>
    <h2>Your intelligence dashboard is ready.</h2>
    <p id="revealSub"></p>
    <div class="axes-mini" id="revealAxes"></div>
    <div class="cta-row">
      <a class="cta" href="./dashboard.html">Enter the Intelligence Dashboard <svg viewBox="0 0 24 24"><polyline points="9,6 15,12 9,18"/></svg></a>
      <button class="replay" id="replayBtn">Replay the build</button>
    </div>
  </div>
</div>

<script src="./build-data.js"></script>
<script>
(function(){
  var D = window.BUILD_DATA;
  var REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var stage = document.getElementById('stage');
  var railEl = document.getElementById('rail');
  var revealEl = document.getElementById('reveal');

  // brand marks
  document.getElementById('brandMark').innerHTML = D.founder.logoSvg;
  document.getElementById('brandName').textContent = D.founder.name;
  document.getElementById('revealMark').innerHTML = D.founder.logoSvg;
  document.getElementById('revealSub').textContent =
    'From ' + fmt(D.scan.universe) + ' rooftops down to ' + (D.scan.curated + D.scan.partners) +
    ' accounts, each with its score, its evidence, and its named buyer.';
  document.getElementById('revealAxes').innerHTML =
    D.axes.map(function(a){return '<span class="axis-mini">'+a.name+'</span>';}).join('');

  var TICK = svg('<polyline points="20,6 9,17 4,12"/>');
  var ARROW = svg('<line x1="4" y1="12" x2="18" y2="12"/><polyline points="12,6 18,12 12,18"/>');

  function svg(inner){return '<svg viewBox="0 0 24 24">'+inner+'</svg>';}
  function fmt(n){return String(n).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
  function scale(x){return REDUCED?.35:1;} // shorten reduced-motion durations
  function tween(from,to,dur,onUpdate,onDone){
    if(REDUCED){onUpdate(to); if(onDone)onDone(); return;}
    var t0=null;
    function step(ts){ if(t0===null)t0=ts; var p=Math.min(1,(ts-t0)/dur);
      var e=1-Math.pow(1-p,3); onUpdate(from+(to-from)*e);
      if(p<1)requestAnimationFrame(step); else if(onDone)onDone(); }
    requestAnimationFrame(step);
  }
  function stagger(nodes,gap,fn){
    nodes.forEach(function(n,i){ setTimeout(function(){fn(n,i);}, REDUCED?0:i*gap); });
  }
  function qtier(t){return t==='high'?'q-high':(t==='med'?'q-med':'q-low');}

  /* ---------------- scenes ---------------- */
  var SCENES = [
    { rail:null, dur:3400, html:coldHTML, enter:function(el){ ael(el); } },

    { rail:0, dur:8200, html:icpHTML, enter:function(el){
        ael(el);
        stagger(qsa(el,'.read-item'),260,function(n){n.classList.add('on');});
        var quals=qsa(el,'.qual-item');
        quals.forEach(function(n){n.classList.add('pop');});
        setTimeout(function(){ stagger(quals,340,function(n){n.classList.add('on');}); }, 900);
        setTimeout(function(){ qsa(el,'.icp-foot .pill').forEach(function(n,i){setTimeout(function(){n.classList.add('on');},i*220);}); }, 900+quals.length*340);
      } },

    { rail:1, dur:8000, html:axesHTML, enter:function(el){
        ael(el);
        var cards=qsa(el,'.axis-card');
        cards.forEach(function(n){n.classList.add('pop');});
        stagger(cards,300,function(n){ n.classList.add('on');
          var f=n.querySelector('.wt-fill'); if(f) setTimeout(function(){f.style.width=f.getAttribute('data-w')+'%';},260);
        });
      } },

    { rail:2, dur:9200, html:scanHTML, enter:scanEnter },

    { rail:3, dur:9200, html:evidenceHTML, enter:evidenceEnter },

    { rail:4, dur:10000, html:scoreHTML, enter:scoreEnter },

    { rail:5, dur:7600, html:shortlistHTML, enter:shortlistEnter },

    { rail:'done', dur:null, html:function(){return '';}, enter:function(){ showReveal(); } }
  ];

  var railDefs=['ICP','Signals','Scan','Evidence','Score','Shortlist'];
  railEl.innerHTML = railDefs.map(function(l,i){
    return '<div class="seg" data-i="'+i+'"><div class="lbl"><span class="sn">'+(i+1)+'</span> '+l+'</div><div class="track"><div class="fill"></div></div></div>';
  }).join('') + '<div class="hint"><kbd>space</kbd> next &nbsp; <kbd>esc</kbd> skip</div>';

  function ael(el){ var a=el.querySelector('.act')||el.firstElementChild; if(a){ a.classList.remove('enter'); void a.offsetWidth; a.classList.add('enter'); } }
  function qsa(el,s){return Array.prototype.slice.call(el.querySelectorAll(s));}

  /* --- scene HTML builders --- */
  function coldHTML(){ return '<div class="act cold">'+
    '<div class="mk">'+D.founder.logoSvg+'</div>'+
    '<div class="eye">Primary · Founder-Driven Intelligence</div>'+
    '<h1>How we built <span class="accent">'+D.founder.name+'’s</span> target map</h1>'+
    '<p>Watch the engine run every step, from a blank market to a ranked, evidence-backed shortlist. No hand-waving.</p>'+
    '</div>'; }

  function icpHTML(){
    var reads=D.icp.read.map(function(r){return '<div class="read-item pop"><div class="t">'+r.label+'</div><div class="m">'+r.meta+'</div></div>';}).join('');
    var quals=D.icp.qualifier.map(function(q){return '<div class="qual-item"><span class="tick">'+TICK+'</span>'+q+'</div>';}).join('');
    return act(1,'Derive the ICP','We don’t guess who buys. We <span class="accent">read it out of the founder’s world.</span>',
      'Memo, buyer calls, and category diligence collapse into a precise, checkable definition of an in-market account.',
      '<div class="icp-grid">'+
        '<div><div class="col-label">What we read</div><div class="read-list">'+reads+'</div></div>'+
        '<div class="icp-arrow">'+ARROW+'</div>'+
        '<div><div class="col-label">The ICP qualifier</div><div class="qual-list">'+quals+'</div></div>'+
      '</div>'+
      '<div class="icp-foot">'+
        '<span class="pill">Buyer: <b>'+D.icp.buyer+'</b></span>'+
        '<span class="pill">Geo: <b>'+D.icp.geo+'</b></span>'+
      '</div>'); }

  function axesHTML(){
    var cards=D.axes.map(function(a){
      return '<div class="axis-card'+(a.key==='warranty'?' wow':'')+'">'+
        '<div class="kind">'+a.kind+'</div>'+
        '<div class="nm">'+a.name+'</div>'+
        '<div class="wt">'+a.weight+'<span>%</span></div>'+
        '<div class="wt-track"><div class="wt-fill" data-w="'+a.weight+'"></div></div>'+
        '<div class="ms">'+a.measures+'</div>'+
      '</div>';
    }).join('');
    return act(2,'Invent the signals','Then we build the <span class="accent">custom signals</span> that predict a ready buyer.',
      'Four axes, weighted for this founder. Warranty Burden is the sharpest read: a group’s brand mix is public, so the pain is measurable before the first call.',
      '<div class="axes-row">'+cards+'</div>'+
      '<div class="axes-note">Service-hiring signal is matched with a per-vertical regex: <code>'+D.hiringRegex+'</code></div>'); }

  function scanHTML(){
    var dots=''; for(var i=0;i<140;i++){dots+='<div class="dot" data-i="'+i+'"></div>';}
    var ex='<div class="ex-lead">Structurally excluded, the software vendors who sell to dealers, not the dealers:</div>'+
      D.scan.excludes.map(function(e){return '<span class="ex">'+e+'</span>';}).join('');
    return act(3,'Scan the universe','Then we scan <span class="accent">the entire market</span>, US and Canada.',
      D.scan.query,
      '<div class="scan-wrap">'+
        '<div class="scan-counter"><div class="n mono" id="scanN">0</div><div class="l" id="scanL">'+D.scan.universeLabel+'</div></div>'+
        '<div class="dot-grid" id="dotGrid">'+dots+'</div>'+
        '<div class="funnel" id="funnel">'+
          fstat(D.scan.universe,'rooftops',false)+farrow()+
          fstat(D.scan.groups,'multi-rooftop groups',false)+farrow()+
          fstat(D.scan.matched,'cleared all 5 criteria',true)+
        '</div>'+
        '<div class="excludes" id="excludes">'+ex+'</div>'+
      '</div>'); }

  function evidenceHTML(){
    var cols=D.enrichments.map(function(e){
      return '<div class="ev-col"><span class="st">'+TICK+'</span><span class="f">'+e.field+'</span><span class="s">'+e.src+'</span></div>';
    }).join('');
    var feed=evidenceFeed();
    return act(4,'Pull the evidence','On every survivor, we <span class="accent">pull and cite the evidence.</span>',
      'Rooftops, brand mix, DMS, current inspection tooling, open service reqs from the job boards, and the named buyer. Six tiered sources per account. No claim ships uncited.',
      '<div class="ev-grid">'+
        '<div><div class="col-label">Enriched per account</div><div class="ev-cols">'+cols+'</div></div>'+
        '<div><div class="ev-feed"><div class="fh"><span class="dotpulse"></span> Evidence feed, live</div><div id="feedList">'+feed+'</div></div></div>'+
      '</div>'); }

  function scoreHTML(){
    var hero=D.companies[0];
    var abars=D.axes.map(function(a){
      return '<div class="abar"><span class="an">'+a.name+'</span><div class="track"><div class="fill" data-v="'+hero.s[a.key]+'"></div></div><span class="av" data-v="'+hero.s[a.key]+'">0.0</span></div>';
    }).join('');
    return act(5,'Score 0 to 100','Every account gets a <span class="accent">weighted, cited score.</span>',
      'Four axis scores blend on this founder’s weights into one number, and the tier is derived straight from it, so the chip and the number can never disagree.',
      '<div class="score-wrap">'+
        '<div class="formula"><b>0.35</b>·Warranty + <b>0.25</b>·Opportunity + <b>0.25</b>·Tooling + <b>0.15</b>·Hiring</div>'+
        '<div class="hero-score">'+
          '<div><div class="hero-name">'+hero.name+'<span class="seg">'+hero.seg+'</span></div><div class="abars">'+abars+'</div></div>'+
          '<div class="score-arrow">'+ARROW+'</div>'+
          '<div class="composite"><div class="big"><span id="compN">0</span><span class="u">/100</span></div><div class="tier" id="compTier">HIGH</div></div>'+
        '</div>'+
        '<div class="score-cap">Every number backed by a cited source. No vibes.</div>'+
      '</div>'); }

  function shortlistHTML(){
    var rows=D.companies.map(function(c,i){
      return '<div class="row '+qtier(c.tier)+'" data-score="'+c.score+'">'+
        '<span class="rk">'+(i+1)+'</span>'+
        '<span class="nm">'+c.name+'<span class="sg">'+c.seg+'</span></span>'+
        '<div class="track"><div class="fill"></div></div>'+
        '<span class="sc">0</span>'+
      '</div>';
    }).join('');
    var pcards=D.partners.map(function(p){
      return '<div class="pcard"><div class="pn">'+p.name+'</div><div class="ps">'+p.status+'</div><div class="pnote">'+p.note+'</div></div>';
    }).join('');
    return act(6,'Curate the shortlist','The accounts <span class="accent">worth walking into.</span>',
      'Ranked by score, tiered by relative priority, plus the design partners already signed. This is what lands in the dashboard.',
      '<div class="ranked" id="ranked">'+rows+'</div>'+
      '<div class="partners"><div class="ph">Already signed &amp; onboarding</div><div class="prow" id="prow">'+pcards+'</div></div>'); }

  /* --- scene enter helpers --- */
  function scanEnter(el){
    ael(el);
    var dots=qsa(el,'.dot');
    var nEl=el.querySelector('#scanN'), lEl=el.querySelector('#scanL');
    // 1) count rooftops up + light dots
    tween(0,D.scan.universe,2400*scale(),function(v){ nEl.textContent=fmt(Math.round(v)); },function(){
      lEl.textContent='groups that run their own fixed-ops';
    });
    stagger(dots,10,function(n){n.classList.add('lit');});
    // 2) narrow to matches: dim most, keep ~15 amber
    setTimeout(function(){
      var matchIdx={}; var picks=[3,11,19,27,38,44,52,61,70,79,88,96,105,118,129];
      picks.forEach(function(p){matchIdx[p]=1;});
      dots.forEach(function(n,i){ if(matchIdx[i]){n.classList.remove('lit');n.classList.add('match');} else {n.classList.remove('lit');n.classList.add('dim');} });
      tween(D.scan.universe,D.scan.matched,1200*scale(),function(v){nEl.textContent=fmt(Math.round(v));},function(){
        nEl.textContent=D.scan.matched; lEl.textContent='cleared all five hard criteria';
      });
    }, REDUCED?200:3400);
    // funnel + excludes
    setTimeout(function(){ qsa(el,'.fstat').forEach(function(n,i){setTimeout(function(){n.classList.add('pop');n.classList.add('on');},i*260);}); }, REDUCED?100:1200);
    setTimeout(function(){ qsa(el,'.ex').forEach(function(n,i){ setTimeout(function(){n.classList.add('struck');}, i*130); }); }, REDUCED?200:5000);
  }

  function evidenceEnter(el){
    ael(el);
    stagger(qsa(el,'.ev-col'),220,function(n){n.classList.add('on');n.style.opacity=1;});
    qsa(el,'.ev-col').forEach(function(n){n.classList.add('pop');});
    var lines=qsa(el,'.feed-line');
    lines.forEach(function(n){n.classList.add('pop');});
    var gap=REDUCED?0:520;
    lines.forEach(function(n,i){ setTimeout(function(){n.classList.add('on');
      var list=el.querySelector('#feedList'); if(!REDUCED&&list) list.scrollTop=list.scrollHeight; }, i*gap); });
  }

  function scoreEnter(el){
    ael(el);
    var hero=D.companies[0];
    setTimeout(function(){
      qsa(el,'.abar').forEach(function(bar,i){
        var f=bar.querySelector('.fill'), av=bar.querySelector('.av');
        var v=parseFloat(f.getAttribute('data-v'));
        setTimeout(function(){ f.style.width=(v/5*100)+'%'; tween(0,v,800*scale(),function(x){av.textContent=x.toFixed(1);}); }, i*260);
      });
    }, REDUCED?0:500);
    setTimeout(function(){
      var cn=el.querySelector('#compN');
      tween(0,hero.score,1400*scale(),function(x){cn.textContent=Math.round(x);});
    }, REDUCED?0:2100);
  }

  function shortlistEnter(el){
    ael(el);
    var rows=qsa(el,'.row');
    var gap=REDUCED?0:230;
    rows.forEach(function(r,i){ setTimeout(function(){
      r.classList.add('on');
      var sc=parseInt(r.getAttribute('data-score'),10);
      var f=r.querySelector('.fill'), num=r.querySelector('.sc');
      if(f) f.style.width=sc+'%';
      tween(0,sc,700*scale(),function(x){num.textContent=Math.round(x);});
    }, i*gap); });
    setTimeout(function(){ qsa(el,'.pcard').forEach(function(p,i){setTimeout(function(){p.classList.add('on');},i*180);}); }, REDUCED?100:rows.length*gap+300);
  }

  function evidenceFeed(){
    // real citations pulled from a few companies
    var f=[
      ['1','SEC','Penske 2024 Form 10-K, 72% premium-brand revenue'],
      ['2','Automotive News','2026 Top 150 Dealership Groups'],
      ['1','Case study','Dealertrack + Xtime MPI at Ed Napleton'],
      ['job','Careers','Group 1, 175 technician + 65 advisor reqs'],
      ['2','CBT News','West Herr equipped ~650 techs with video MPI'],
      ['1','Pon Holdings','indiGO ultra-luxury portfolio record'],
      ['li','LinkedIn','Fixed Ops Director identified, 9 of 10 accounts'],
      ['1','SEC','Group 1 2024 10-K, 145 US dealerships'],
      ['2','Car Dealership Guy','Go Auto reaches 76 rooftops']
    ];
    return f.map(function(x){
      var cls=x[0]==='1'?'t1':'t2';
      return '<div class="feed-line"><span class="tt '+cls+'">'+x[1]+'</span><span class="tx">'+x[2]+'</span></div>';
    }).join('');
  }
  function fstat(n,l,match){return '<div class="fstat'+(match?' match':'')+' pop"><div class="n mono">'+fmt(n)+'</div><div class="l">'+l+'</div></div>';}
  function farrow(){return '<span class="fa">'+ARROW+'</span>';}

  function act(n,eyebrow,title,narr,body){
    return '<div class="act">'+
      '<div class="act-eyebrow"><span class="bar"></span><span class="step-n">0'+n+'</span> '+eyebrow+' <span class="bar"></span></div>'+
      '<h2 class="act-title">'+title+'</h2>'+
      '<p class="act-narr">'+narr+'</p>'+
      '<div class="act-body">'+body+'</div>'+
    '</div>'; }

  /* ---------------- scheduler ---------------- */
  var cur=-1, timer=null;
  function setRail(i){
    var segs=qsa(railEl,'.seg');
    segs.forEach(function(s,idx){
      var fill=s.querySelector('.fill');
      s.classList.remove('active','done');
      if(i==='done'){ s.classList.add('done'); fill.style.transition='none'; fill.style.width='100%'; return; }
      if(idx<i){ s.classList.add('done'); fill.style.transition='none'; fill.style.width='100%'; }
      else if(idx===i){ s.classList.add('active'); }
      else { fill.style.transition='none'; fill.style.width='0%'; }
    });
  }
  function fillCurrentRail(i,dur){
    if(typeof i!=='number') return;
    var seg=qsa(railEl,'.seg')[i]; if(!seg)return;
    var fill=seg.querySelector('.fill');
    fill.style.transition='none'; fill.style.width='0%'; void fill.offsetWidth;
    fill.style.transition='width '+(dur/1000)+'s linear'; fill.style.width='100%';
  }
  function go(i){
    if(timer){clearTimeout(timer);timer=null;}
    if(i<0||i>=SCENES.length){return;}
    cur=i; var sc=SCENES[i];
    if(i===SCENES.length-1){ setRail('done'); sc.enter(stage); return; }
    hideReveal();
    stage.innerHTML = sc.html();
    setRail(sc.rail);
    if(sc.enter) sc.enter(stage);
    if(typeof sc.rail==='number') fillCurrentRail(sc.rail, REDUCED?sc.dur*scale():sc.dur);
    var d = REDUCED? Math.max(1400, sc.dur*scale()) : sc.dur;
    if(sc.dur!==null){ timer=setTimeout(function(){ go(i+1); }, d); }
  }
  function next(){ if(cur<SCENES.length-1) go(cur+1); }
  function toDashboard(){ window.location.href='./dashboard.html'; }

  function showReveal(){ revealEl.classList.add('show'); }
  function hideReveal(){ revealEl.classList.remove('show'); }
  document.getElementById('replayBtn').addEventListener('click',function(){ hideReveal(); go(0); });

  // controls
  document.addEventListener('keydown',function(e){
    if(e.key===' '||e.key==='ArrowRight'){ e.preventDefault(); next(); }
    else if(e.key==='Escape'){ toDashboard(); }
  });
  stage.addEventListener('click',function(){ if(cur>=0 && cur<SCENES.length-1) next(); });

  // go
  go(0);
})();
</script>
</body>
</html>
